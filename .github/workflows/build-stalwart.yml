name: Build Stalwart for FreeBSD

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build on FreeBSD 14.2
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"  # More stable than 15.0
          mem: 12288       # More memory
          cpu: 4
          usesh: true
          sync: scp        # More reliable than rsync
          copyback: true
          prepare: |
            pkg update
            pkg install -y rust cargo git-lite gmake
          run: |
            git clone --depth 1 --branch v0.15.5 https://github.com/stalwartlabs/mail-server.git
            cd mail-server
            cargo build --release -p stalwart --no-default-features --features "sqlite"
            cp target/release/stalwart /tmp/
      
      - uses: actions/upload-artifact@v4
        with:
          name: stalwart-freebsd
          path: /tmp/stalwart
